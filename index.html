    <!-- Tailwind CSS via CDN -->

    <!-- React & ReactDOM via CDN -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "hsl(0 0% 100%)",
                        foreground: "hsl(240 10% 3.9%)",
                        primary: "hsl(240 5.9% 10%)",
                        "primary-foreground": "hsl(0 0% 98%)",
                        gold: "hsl(43 74% 49%)",
                        "gold-foreground": "hsl(0 0% 100%)",

                        border: "hsl(240 5.9% 90%)",

                    fontFamily: {

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Reveal animation */
        [data-reveal] {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease-out;
        }

        [data-reveal].is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Navbar transparente */
        .navbar-transparent {
            background: transparent !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15) !important;
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .navbar-transparent a,
        .navbar-transparent button {
            color: #fff !important;
        }

        .navbar-transparent .nav-logo {
            color: #fff !important;
        }

        .navbar-scrolled {
            background: rgba(255, 255, 255, 0.92) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08) !important;
        }

        .navbar-scrolled a,
        .navbar-scrolled button {
            color: inherit !important;
        }

        .navbar-scrolled .nav-logo {
            color: #0f0f0f !important;
        }

        /* Landing commerciale */
        .commercial-section {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1208 50%, #0f0f0f 100%);
            position: relative;
            overflow: hidden;
        }

        .commercial-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 60% 50%, rgba(192, 148, 58, 0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        .promo-card {
            border: 1px solid rgba(192, 148, 58, 0.3);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .promo-card:hover {
            transform: translateY(-6px);
            border-color: rgba(192, 148, 58, 0.7);
            box-shadow: 0 20px 50px rgba(192, 148, 58, 0.12);
        }

        .gold-line {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, #c0943a, #e8c97a);
            display: inline-block;
        }

        .countdown-box {
            background: rgba(192, 148, 58, 0.12);
            border: 1px solid rgba(192, 148, 58, 0.4);
            min-width: 64px;
        }
    </style>
</head>

<body class="bg-background text-foreground antialiased">

        const TikTokIcon = ({ className = "" }) => (
            <svg viewBox="0 0 24 24" aria-hidden="true" className={className} fill="currentColor">
                <path d="M16.6 3c.32 2.38 1.66 3.8 4.02 3.95v3.16a7.35 7.35 0 0 1-4.02-1.25v5.98c0 3.04-2.08 5.16-5.2 5.16-2.85 0-5.02-1.94-5.02-4.7 0-3.12 2.48-5.14 5.96-4.52v3.27c-1.56-.5-2.7.2-2.7 1.25 0 .95.76 1.54 1.74 1.54 1.18 0 1.88-.72 1.88-2.14V3h3.34Z" />

        );

        const WhatsAppIcon = ({ className = "" }) => (
            <svg viewBox="0 0 24 24" aria-hidden="true" className={className} fill="currentColor">
                <path d="M12.04 2C6.58 2 2.14 6.44 2.14 11.9c0 1.74.46 3.44 1.32 4.94L2 22l5.29-1.39a9.86 9.86 0 0 0 4.75 1.21h.01c5.46 0 9.9-4.44 9.9-9.9C21.95 6.45 17.5 2 12.04 2Zm0 18.13h-.01a8.22 8.22 0 0 1-4.19-1.15l-.3-.18-3.14.82.84-3.06-.2-.32a8.2 8.2 0 1 1 7 3.89Zm4.5-6.15c-.25-.12-1.46-.72-1.69-.8-.23-.08-.4-.12-.56.12-.17.25-.65.8-.8.96-.15.17-.29.19-.54.06-.25-.12-1.04-.38-1.98-1.22-.73-.65-1.23-1.46-1.37-1.71-.14-.25-.02-.38.11-.5.11-.11.25-.29.37-.44.12-.15.17-.25.25-.42.08-.17.04-.31-.02-.44-.06-.12-.56-1.35-.77-1.85-.2-.49-.41-.42-.56-.43h-.48c-.17 0-.44.06-.67.31-.23.25-.88.86-.88 2.1s.9 2.44 1.03 2.6c.12.17 1.77 2.7 4.28 3.78.6.26 1.06.41 1.43.53.6.19 1.14.16 1.57.1.48-.07 1.46-.6 1.67-1.17.21-.58.21-1.07.15-1.17-.06-.1-.23-.17-.48-.29Z" />

            const [products, setProducts] = useState(defaultProducts);
            const [content, setContent] = useState(defaultContent);
            const [menuOpen, setMenuOpen] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const [countdown, setCountdown] = useState({ h: '23', m: '47', s: '59' });

                const handleScroll = () => setScrolled(window.scrollY > 60);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

                let total = 23 * 3600 + 47 * 60 + 59;
                const timer = setInterval(() => {
                    total--;
                    if (total < 0) total = 86399;
                    const h = String(Math.floor(total / 3600)).padStart(2, '0');
                    const m = String(Math.floor((total % 3600) / 60)).padStart(2, '0');
                    const s = String(total % 60).padStart(2, '0');
                    setCountdown({ h, m, s });
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                // Initialize Supabase if URL and Key are available, else rely on default content
                // As this is a single file without env vars, we mock the fetch or rely on defaults
                // For a real app, user would put Supabase keys here

                // Reveal animation setup
                const elements = document.querySelectorAll("[data-reveal]");
                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting) entry.target.classList.add("is-visible");
                        });
                    },
                    { threshold: 0.12 }
                );

                elements.forEach((element) => observer.observe(element));
                return () => observer.disconnect();
            }, []);

            const categories = useMemo(() => Array.from(new Set(products.map((product) => product.category))), [products]);
            const hero = content.hero ?? defaultContent.hero;
            const about = content.about ?? defaultContent.about;
            const contact = content.contact ?? defaultContent.contact;
            const whatsappUrl = hero.link_url || "https://wa.me/212600000000";

            const submitContact = async (event) => {
                event.preventDefault();
                setIsSubmitting(true);

                // Simulate network request
                setTimeout(() => {
                    alert("Votre demande a bien été transmise.");
                    setIsSubmitting(false);
                    event.target.reset();
                }, 1000);

            return (

                                <a className="transition-colors hover:text-gold" href="#colliers">Colliers</a>
                                <a className="transition-colors hover:text-gold" href="#artisanat">Artisanat</a>

                                    <a href="#bagues" onClick={() => setMenuOpen(false)}>Bagues</a>
                                    <a href="#bracelets" onClick={() => setMenuOpen(false)}>Bracelets</a>
                                    <a href="#colliers" onClick={() => setMenuOpen(false)}>Colliers</a>
                                    <a href="#artisanat" onClick={() => setMenuOpen(false)}>Artisanat</a>
                                    <a href="#maison" onClick={() => setMenuOpen(false)}>Maison</a>
                                </div>
                            </div>

                    <section id="accueil" className="relative flex min-h-[92vh] items-end overflow-hidden bg-primary pt-24">

                                <p className="mt-5 text-white/60 max-w-xl mx-auto text-base leading-7">Pièces rares, créations sur-mesure et collections capsules — disponibles pour une durée limitée.</p>

                            <div className="promo-card rounded-none mb-8 grid lg:grid-cols-2 overflow-hidden">

                                    <img src="https://images.unsplash.com/photo-1602173574767-37ac01994b2a?q=80&w=1024&auto=format&fit=crop" alt="Collection capsule" className="w-full h-72 lg:h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-r from-black/40 to-transparent"></div>
                                    <span className="absolute top-4 left-4 bg-yellow-400 text-black text-xs font-bold uppercase tracking-widest px-3 py-1">Nouveauté</span>
                                </div>
                                <div className="p-10 flex flex-col justify-center">
                                    <p className="text-xs uppercase tracking-luxe text-yellow-400 font-medium mb-3">Collection Capsule · Printemps 2026</p>

                                    <p className="text-white/60 leading-7 mb-6">Une ligne de 12 pièces exclusives façonnées à la main, inspirées des côtes méditerranéennes. Or 18 carats, saphirs et perles naturelles.</p>
                                    <div className="flex items-center gap-4 mb-8">

                                    </div>

                    </section>

                    <section id="collection" className="bg-background py-20 sm:py-28" data-reveal>
                        <div className="mx-auto max-w-7xl px-5 lg:px-8">
                            <div className="mb-12 flex flex-col justify-between gap-5 sm:flex-row sm:items-end">
                                <div>
                                    <p className="mb-4 text-sm uppercase tracking-luxe text-gold font-medium">Catalogue</p>
                                    <h2 className="font-serif text-4xl leading-tight text-foreground sm:text-6xl">Pièces signatures</h2>
                                </div>
                            </div>

                            <div className="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
                                {products.map((product, index) => (
                                    <article key={product.id} className="group overflow-hidden border border-border bg-card shadow-sm transition-all duration-500 hover:-translate-y-1 hover:shadow-lg">
                                        <div className="aspect-square overflow-hidden bg-muted">
                                            <img
                                                src={product.image_url || fallbackImages[index % fallbackImages.length]}
                                                alt={`${product.name} - ${product.category}`}
                                                className="h-full w-full object-cover transition-transform duration-700 group-hover:scale-105"
                                                loading="lazy"
                                            />
                                        </div>
                                        <div className="p-6">
                                            <div className="mb-4 flex items-center justify-between gap-4 text-xs uppercase tracking-luxe text-gold font-medium">
                                                <span>{product.category}</span>
                                                {product.is_featured && <span>Signature</span>}
                                            </div>
                                            <h3 className="font-serif text-2xl text-card-foreground">{product.name}</h3>
                                            <p className="mt-3 min-h-[5rem] text-sm leading-7 text-muted-foreground">{product.description}</p>
                                            <p className="mt-6 font-serif text-2xl text-foreground">{formatPrice(Number(product.price))}</p>
                                        </div>
                                    </article>
                                ))}
                            </div>
                        </div>
                    </section>



                    <footer className="border-t border-border bg-background py-10">
                        <div className="mx-auto flex max-w-7xl flex-col gap-6 px-5 sm:flex-row sm:items-center sm:justify-between lg:px-8">
                            <div className="flex items-center gap-3">
                                <img src="logo-final.png" alt="BVB Logo" className="h-10 w-auto object-contain" />
                                <p className="font-serif text-2xl text-foreground font-semibold">Benchakroun</p>
                            </div>
                            <div className="flex items-center gap-4 text-muted-foreground">
                                <a href="https://www.facebook.com/" aria-label="Facebook" className="transition-colors hover:text-gold"><FacebookIcon className="w-5 h-5" /></a>
                                <a href="https://www.instagram.com/" aria-label="Instagram" className="transition-colors hover:text-gold"><InstagramIcon className="w-5 h-5" /></a>
                                <a href="https://www.tiktok.com/" aria-label="TikTok" className="transition-colors hover:text-gold"><TikTokIcon className="w-5 h-5" /></a>
                                <a href={whatsappUrl} aria-label="WhatsApp" className="transition-colors hover:text-gold"><WhatsAppIcon className="w-5 h-5" /></a>
                            </div>
                        </div>
                    </footer>

                    <a
                        href={whatsappUrl}
                        target="_blank"
                        rel="noreferrer"
                        className="fixed bottom-5 right-5 z-50 grid size-14 place-items-center rounded-full bg-gold text-white shadow-lg transition-transform hover:scale-105 focus:outline-none"
                        aria-label="Ouvrir WhatsApp"
                        style={{ width: '56px', height: '56px' }}
                    >
                        <WhatsAppIcon className="w-7 h-7" />
                    </a>
                </main>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Index />);
    </script>
</body>

</html>
